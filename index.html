<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>北京平和工业品智能选型</title>
  <meta name="description" content="北京平和安全栅、隔离器、电涌保护器、安全继电器工业品智能选型工具。">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo">PH</div>
      <div>
        <p>北京平和</p>
        <h1>工业品智能选型</h1>
      </div>
    </div>
    <div class="header-actions">
      <span class="status-pill">GitHub Pages 静态版 V5</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel input-panel">
      <div class="section-title">
        <span>客户需求输进来</span>
        <small>Ctrl / ⌘ + Enter 快速选型</small>
      </div>
      <textarea id="need-input" placeholder="例如：西门子PLC的AI板卡接收来自现场的4-20mA信号，检测现场压力变化，中间加安全栅，一入一出"></textarea>
      <div class="button-row">
        <button class="btn primary" id="run-btn">开始选型</button>
        <button class="btn ghost" id="clear-btn">清空</button>
      </div>
      <div class="quick-examples">
        <button data-action="example" data-text="西门子PLC的AI板卡接收来自现场的4-20mA信号，检测现场压力变化，中间加安全栅，一入一出">AI 检测压力</button>
        <button data-action="example" data-text="现场变送器4-20mA信号回PLC，中间加安全栅，一入一出">变送器回 PLC</button>
        <button data-action="example" data-text="PLC的AO输出4-20mA信号给现场的气动薄膜调节阀，中间加安全栅，一入一出">AO 到调节阀</button>
        <button data-action="example" data-text="客户要便宜一点的4-20mA安全栅，C系列">C 系列安全栅</button>
        <button data-action="example" data-text="RS485信号防雷，用浪涌保护器">RS485 浪涌</button>
      </div>
    </section>

    <section class="panel result-panel" id="result-panel">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>等待输入需求后开始选型...</p>
      </div>
    </section>

    <aside class="side-panel">
      <section class="panel rules-panel">
        <div class="section-title">选型逻辑</div>
        <div id="rules-list" class="list-container">加载中...</div>
      </section>
      
      <section class="panel history-panel">
        <div class="section-title">常用产品</div>
        <div id="products-list" class="list-container">加载中...</div>
      </section>
    </aside>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 北京平和工业控制系统工程有限公司</p>
  </footer>

  <script type="module" src="./main.js"></script>
</body>
</html>
